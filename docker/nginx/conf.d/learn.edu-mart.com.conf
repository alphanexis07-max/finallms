upstream lms_api {
  server api:8000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name learn.edu-mart.com;

  # Let's Encrypt HTTP-01 challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name learn.edu-mart.com;

  ssl_certificate     /etc/letsencrypt/live/learn.edu-mart.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/learn.edu-mart.com/privkey.pem;

  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Security headers (safe defaults for SPA + API)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Frontend (Vite build output)
  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # API proxy
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_pass http://lms_api;
  }

  # WebSocket proxy
  location /ws/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_pass http://lms_api;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
