services:
  mongo:
    image: mongo:7
    container_name: lms-mongo
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-lms}
    volumes:
      - mongo_data:/data/db
    networks:
      - lms

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-api
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./secrets/backend.env
    volumes:
      # Ensure pydantic can load ".env" inside container without manual steps
      - ./secrets/backend.env:/app/.env:ro
    expose:
      - "8000"
    networks:
      - lms
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
        VITE_API_MAX_CONCURRENCY: ${VITE_API_MAX_CONCURRENCY:-4}
    container_name: lms-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # Host-managed Let's Encrypt certs + challenge webroot
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    networks:
      - lms

volumes:
  mongo_data:
    name: lms_mongo_data

networks:
  lms:
    name: lms
